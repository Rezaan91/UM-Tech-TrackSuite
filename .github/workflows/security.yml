name: Security & Dependency Scan

on:
  schedule:
    - cron: "0 8 * * 1"   # Every Monday 8am UTC
  push:
    branches: [main]
    paths:
      - "backend/requirements*.txt"
      - "frontend/package*.json"

jobs:
  python-audit:
    name: 🔐 Python Security Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Audit with pip-audit
        run: |
          pip install pip-audit
          pip-audit -r backend/requirements.txt --format json -o audit-report.json --exit-code 0
          pip-audit -r backend/requirements-dev.txt --exit-code 0

      - name: Upload audit report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: python-audit-report
          path: audit-report.json

  node-audit:
    name: 🔐 Node Security Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package.json
      - name: Audit npm packages
        run: |
          cd frontend
          npm install --no-fund --no-audit
          npm audit --audit-level=high --json > npm-audit.json || true

      - name: Upload npm audit report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: node-audit-report
          path: frontend/npm-audit.json

  codeql:
    name: 🔍 CodeQL Analysis
    runs-on: ubuntu-latest
    permissions:
      security-events: write
    strategy:
      matrix:
        language: [python, javascript]
    steps:
      - uses: actions/checkout@v4
      - uses: github/codeql-action/init@v3
        with:
          languages: ${{ matrix.language }}
      - uses: github/codeql-action/autobuild@v3
      - uses: github/codeql-action/analyze@v3
