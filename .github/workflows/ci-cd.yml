name: UM TrackSuite CI/CD

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  PYTHON_VERSION: "3.11"
  NODE_VERSION: "20"

# ─────────────────────────────────────────────────────────────
# JOB 1 — Backend: lint + test (SQLite in-memory, no service needed)
# ─────────────────────────────────────────────────────────────
jobs:
  backend-test:
    name: 🐍 Backend Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - name: ⬇️ Checkout
        uses: actions/checkout@v4

      - name: 🐍 Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: backend/requirements*.txt

      - name: 📦 Install dependencies
        run: pip install -r requirements.txt -r requirements-dev.txt

      - name: 🔍 Lint with Ruff
        run: ruff check . --output-format=github

      - name: 🎨 Format check with Black
        run: black --check .

      - name: 🧪 Run tests (SQLite in-memory)
        env:
          DATABASE_URL: "sqlite:///:memory:"
          SECRET_KEY: "ci-test-secret-not-for-production"
          ALLOWED_ORIGINS: "http://localhost:5173"
        run: |
          pytest tests/ -v \
            --tb=short \
            --cov=. \
            --cov-report=xml \
            --cov-report=term-missing \
            --junitxml=test-results.xml

      - name: 📊 Upload coverage
        uses: codecov/codecov-action@v4
        if: always()
        with:
          files: backend/coverage.xml
          flags: backend
          fail_ci_if_error: false

      - name: 📋 Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: backend-test-results
          path: backend/test-results.xml

# ─────────────────────────────────────────────────────────────
# JOB 2 — Frontend: lint + build
# ─────────────────────────────────────────────────────────────
  frontend-build:
    name: ⚛️ Frontend Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - name: ⬇️ Checkout
        uses: actions/checkout@v4

      - name: 🟢 Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: 📦 Install dependencies
        run: npm ci

      - name: 🔍 Lint
        run: npm run lint

      - name: 🏗️ Build
        env:
          VITE_API_BASE: ${{ secrets.VITE_API_BASE }}
        run: npm run build

      - name: 📦 Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist/
          retention-days: 1

# ─────────────────────────────────────────────────────────────
# JOB 3 — Deploy Backend → Render
# ─────────────────────────────────────────────────────────────
  deploy-backend:
    name: 🚀 Deploy Backend → Render
    runs-on: ubuntu-latest
    needs: [backend-test, frontend-build]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    environment:
      name: production-backend

    steps:
      - name: 🚀 Trigger Render deploy
        id: trigger
        env:
          RENDER_API_KEY: ${{ secrets.RENDER_API_KEY }}
          RENDER_SERVICE_ID: ${{ secrets.RENDER_SERVICE_ID }}
        run: |
          RESPONSE=$(curl -s -w "\n%{http_code}" \
            -X POST \
            -H "Authorization: Bearer $RENDER_API_KEY" \
            -H "Content-Type: application/json" \
            "https://api.render.com/v1/services/$RENDER_SERVICE_ID/deploys" \
            -d '{"clearCache":false}')

          HTTP_CODE=$(echo "$RESPONSE" | tail -n1)
          BODY=$(echo "$RESPONSE" | head -n-1)
          echo "$BODY"

          if [ "$HTTP_CODE" != "201" ]; then
            echo "❌ Render trigger failed (HTTP $HTTP_CODE)"
            exit 1
          fi

          DEPLOY_ID=$(echo "$BODY" | python3 -c "import sys,json; print(json.load(sys.stdin)['deploy']['id'])")
          echo "deploy_id=$DEPLOY_ID" >> $GITHUB_OUTPUT
          echo "✅ Deploy triggered: $DEPLOY_ID"

      - name: ⏳ Wait for deploy
        env:
          RENDER_API_KEY: ${{ secrets.RENDER_API_KEY }}
          RENDER_SERVICE_ID: ${{ secrets.RENDER_SERVICE_ID }}
          DEPLOY_ID: ${{ steps.trigger.outputs.deploy_id }}
        run: |
          MAX=360
          ELAPSED=0
          INTERVAL=15
          while [ $ELAPSED -lt $MAX ]; do
            STATUS=$(curl -s \
              -H "Authorization: Bearer $RENDER_API_KEY" \
              "https://api.render.com/v1/services/$RENDER_SERVICE_ID/deploys/$DEPLOY_ID" \
              | python3 -c "import sys,json; print(json.load(sys.stdin)['deploy']['status'])")
            echo "  [${ELAPSED}s] status: $STATUS"
            case $STATUS in
              live)        echo "✅ Live!"; exit 0 ;;
              deactivated|canceled|failed) echo "❌ Deploy $STATUS"; exit 1 ;;
            esac
            sleep $INTERVAL
            ELAPSED=$((ELAPSED+INTERVAL))
          done
          echo "⏰ Timed out"; exit 1

      - name: 🏥 Health check
        env:
          RENDER_SERVICE_URL: ${{ secrets.RENDER_SERVICE_URL }}
        run: |
          sleep 15
          for i in 1 2 3 4 5; do
            CODE=$(curl -s -o /dev/null -w "%{http_code}" "$RENDER_SERVICE_URL/health")
            if [ "$CODE" = "200" ]; then echo "✅ Health check passed"; exit 0; fi
            echo "  attempt $i: HTTP $CODE — waiting 15s"
            sleep 15
          done
          echo "❌ Health check failed"; exit 1

# ─────────────────────────────────────────────────────────────
# JOB 4 — Deploy Frontend → Firebase Hosting
# ─────────────────────────────────────────────────────────────
  deploy-frontend:
    name: 🌐 Deploy Frontend → Firebase Hosting
    runs-on: ubuntu-latest
    needs: [backend-test, frontend-build]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    environment:
      name: production-frontend

    steps:
      - name: ⬇️ Checkout
        uses: actions/checkout@v4

      - name: 🟢 Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: 📦 Install Firebase CLI
        run: npm install -g firebase-tools

      - name: 🔐 Configure Firebase credentials
        env:
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
        run: |
          echo "$FIREBASE_SERVICE_ACCOUNT" > "$RUNNER_TEMP/firebase-sa.json"

      - name: 🚀 Deploy to Firebase Hosting
        env:
          FIREBASE_PROJECT_ID: ${{ secrets.FIREBASE_PROJECT_ID }}
          GOOGLE_APPLICATION_CREDENTIALS: ${{ runner.temp }}/firebase-sa.json
        run: |
          cd frontend
          firebase deploy --only hosting --project "$FIREBASE_PROJECT_ID" --non-interactive
          echo "✅ Deployed: https://$FIREBASE_PROJECT_ID.web.app"

# ─────────────────────────────────────────────────────────────
# JOB 5 — Summary
# ─────────────────────────────────────────────────────────────
  summary:
    name: 📋 Summary
    runs-on: ubuntu-latest
    needs: [deploy-backend, deploy-frontend]
    if: always() && github.ref == 'refs/heads/main'

    steps:
      - name: Write summary
        run: |
          echo "## 🚀 Deployment Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Service | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|---------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Backend (Render) | ${{ needs.deploy-backend.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Frontend (Firebase Hosting) | ${{ needs.deploy-frontend.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Commit | \`${{ github.sha }}\` |" >> $GITHUB_STEP_SUMMARY
