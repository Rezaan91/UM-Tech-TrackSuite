services:
  - type: web
    name: um-tracksuite-api
    env: python
    region: oregon
    plan: free
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: ENVIRONMENT
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: tracksuite-db
          property: connectionString

databases:
  - name: tracksuite-db
    databaseName: tracksuite
    user: tracksuite
    region: oregon
    plan: free
